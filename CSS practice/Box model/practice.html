<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        #button_one{
            height: 70px;
            width: 70px;
            padding: 10px 15px;
            margin: 100px;
            border: 3px dotted rgb(255, 0, 0);
            border-radius: 70px;
        }

        .box{
            background-color: blue;
            height: 100px;
            width: 100px;
            margin: 5px;
            padding: 5px;
             border: 3px dotted rgb(255, 0, 0);
        }
    </style>
</head>
<body>
    <button id="button_one">Click me</button>

     <div id="first" class="box" style="box-sizing:content-box ;">First</div>
    <div id="second" class="box" style="box-sizing:border-box ;">Second</div>
    <button>click me</button>
</body>
</html>
