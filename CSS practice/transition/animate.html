<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
           .box{
            height: 70px;
            width: 70px;
            border: 2px solid;
            border-radius: 5px;
            background-color: powderblue;
            position: relative;
            top: 15px;
            left: 15px;

            /* animation-name: ghummar;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate; */

            animation: ghummar 2s ease-in-out 0s infinite alternate;

        }

        @keyframes ghummar {
            0% {left: 10px;}
            75% {left: 75px ;}
            100% {left: 200px;}
        }
    </style>
</head>
<body>
        <div class="box">animate</div>

</body>
</html>
