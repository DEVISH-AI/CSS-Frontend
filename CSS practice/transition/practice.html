<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <style>
        #progress-container{
            height: 30px;
            width: 90%;
            background-color: gainsboro;
            border: 2px solid;
            border-radius: 20px;
            position: relative;
            left: 4%;
        }

        #progress-bar{
            height: 100%;
            border-radius: 20px;
            background-color: greenyellow;
            animation: progressbar 3s ;
        }

        @keyframes progressbar {
            0% {width: 0%;}
            90% {width: 80%;}
            98% {width: 90%;}
            100% {width: 100%;}
        }
    </style>
</head>
<body>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
</body>
</html>
